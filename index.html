<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      height: 100vh; /* ocupa todo el iframe */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 🔥 clave: se adapta sin deformarse */
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="https://hvasquezsheeq.github.io/banner_cambio_piezas/cambio.png.png" alt="banner">
  </div>
</body>
</html>
